name: Release Tessel

run-name: Release ${{ inputs.version || github.ref_name }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.2.0 or v0.2.0'
        required: true
        type: string
      prerelease:
        description: 'Mark this GitHub Release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - id: version
        name: Normalize version and tag
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          version="${REQUESTED_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Version must be valid SemVer, for example 0.2.0 or 0.2.0-beta.1." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify release source
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  package:
    name: Package ${{ matrix.platform }}
    needs: [prepare, verify]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: dist:mac
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/latest-mac.yml
              dist/*.blockmap
          - platform: windows
            os: windows-latest
            script: dist:win
            artifact-path: |
              dist/*.exe
              dist/*.zip
              dist/latest.yml
              dist/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version for this release
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: npm pkg set version="$RELEASE_VERSION"

      - name: Package app
        env:
          CI: true
          # Releases are intentionally unsigned so users can install the macOS build directly.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm ${{ matrix.script }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tessel-${{ matrix.platform }}-${{ needs.prepare.outputs.tag }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: [prepare, package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update release
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          mapfile -t files < <(find release-artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            release_args=(
              "$RELEASE_TAG"
              "${files[@]}"
              --target "$GITHUB_SHA"
              --title "Tessel v$RELEASE_VERSION"
              --generate-notes
            )
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi
