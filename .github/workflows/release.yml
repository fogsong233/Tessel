name: Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.platform }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            script: dist:mac
            artifact-path: |
              dist/*.dmg
              dist/*.zip
          - platform: windows
            os: windows-latest
            script: dist:win
            artifact-path: |
              dist/*.exe
              dist/*.zip
    env:
      CI: true
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package app
        run: pnpm ${{ matrix.script }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidelight-${{ matrix.platform }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update release
        shell: bash
        run: |
          mapfile -t files < <(find release-artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --verify-tag \
              --title "Sidelight $GITHUB_REF_NAME" \
              --notes "Automated macOS and Windows packages for $GITHUB_REF_NAME."
          fi
